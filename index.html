<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>宝宝数学乐园 - 互动学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #b8e1fc 0%, #f9e6b3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            padding: 20px;
            position: relative;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 250, 225, 0.85);
            border-radius: 80px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            padding: 20px 20px 30px;
            min-height: 85vh;
            transition: all 0.3s;
        }

        .sound-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #ffb347;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 0 #c16f1a;
            cursor: pointer;
            z-index: 200;
        }
        .sound-control:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c16f1a;
        }

        .main-menu {
            text-align: center;
            padding: 30px 20px;
        }
        .main-menu h1 {
            font-size: 3rem;
            color: #ff8c42;
            text-shadow: 5px 5px 0 #ffd966;
            margin-bottom: 20px;
        }
        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
        }
        .menu-btn {
            background: #ffd966;
            border: none;
            width: 220px;
            padding: 25px 15px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #5a3e1b;
            cursor: pointer;
            box-shadow: 0 12px 0 #c29b3b;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #c29b3b;
        }
        .menu-btn span {
            font-size: 3rem;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-home-btn {
            background: #ffb347;
            border: none;
            font-size: 1.3rem;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #c16f1a;
        }
        .module-title {
            font-size: 2rem;
            background: #ffd966;
            padding: 8px 25px;
            border-radius: 50px;
            color: #5a3e1b;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        .explain-btn {
            background: #6c9ebf;
            border: none;
            font-size: 1.1rem;
            padding: 5px 15px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 0 #3f5e7a;
        }

        .card-content {
            background: #fffef7;
            border-radius: 55px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .number-show {
            text-align: center;
            background: #fdebb3;
            border-radius: 50px;
            padding: 20px;
        }
        .big-digit {
            font-size: 6rem;
            font-weight: bold;
            background: white;
            display: inline-block;
            width: 130px;
            border-radius: 70px;
            box-shadow: inset 0 -5px 0 #ffb347;
            color: #e67e22;
        }
        .quantity-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            background: #fff2cf;
            border-radius: 48px;
            padding: 15px;
        }
        .icon-item {
            font-size: 2.7rem;
            background: white;
            border-radius: 30px;
            padding: 5px;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }
        .nav-btn {
            background: #ffb347;
            border: none;
            font-size: 2.2rem;
            width: 65px;
            border-radius: 50px;
            color: white;
            box-shadow: 0 5px 0 #c16f1a;
        }

        .game-area {
            background: #fff2df;
            border-radius: 45px;
            padding: 20px;
            text-align: center;
        }
        .object-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }
        .object-emoji {
            font-size: 3rem;
            background: #ffe3b5;
            padding: 8px;
            border-radius: 40px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .option-btn {
            background: #6c9ebf;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            width: 85px;
            padding: 12px 0;
            border-radius: 70px;
            color: white;
            box-shadow: 0 6px 0 #3f5e7a;
        }
        .feedback {
            font-size: 1.4rem;
            margin-top: 12px;
            padding: 10px;
            background: #fff0c0;
            border-radius: 40px;
            color: #a5580c;
            font-weight: bold;
        }
        .score-area {
            background: #ffda9e;
            border-radius: 40px;
            padding: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #bc6f1a;
            margin-top: 15px;
        }

        .math-animation-area {
            background: #ffe7c4;
            border-radius: 40px;
            padding: 15px;
            margin-top: 15px;
        }
        .animation-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 130px;
            background: #fff5e6;
            border-radius: 35px;
            padding: 15px;
        }
        .anim-icon {
            font-size: 3rem;
            background: #fff0cf;
            border-radius: 30px;
            padding: 8px;
            animation: popIn 0.3s;
        }
        .anim-icon-removed {
            font-size: 3rem;
            background: #ffe0b5;
            border-radius: 30px;
            padding: 8px;
            opacity: 0.5;
            animation: fadeOut 0.3s;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.3; }
        }
        .anim-operator {
            font-size: 2.5rem;
            font-weight: bold;
            background: #ffd98c;
            padding: 8px 20px;
            border-radius: 50px;
        }
        .animate-btn {
            background: #ffb347;
            border: none;
            font-size: 1.3rem;
            padding: 10px 22px;
            border-radius: 50px;
            color: white;
            box-shadow: 0 5px 0 #c16f1a;
        }

        #parityQuestion {
            font-size: 2.5rem;
            font-weight: bold;
            background: #ffecb3;
            padding: 12px 28px;
            border-radius: 50px;
            color: #b45f2b;
        }
        .parity-area {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
        }
        .parity-btn {
            background: #ffb347;
            border: none;
            font-size: 2.4rem;
            padding: 18px 35px;
            border-radius: 70px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 0 #c16f1a;
        }
        .pair-animation {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            background: #fff8e7;
            border-radius: 60px;
            padding: 20px;
        }
        .pair-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #fffaec;
            border-radius: 50px;
            padding: 10px 15px;
        }
        .pair-group span {
            font-size: 3rem;
        }
        .pair-group .pair-label {
            font-size: 1.2rem;
            background: #ffdd99;
            border-radius: 30px;
            padding: 3px 12px;
            margin-top: 6px;
            color: #b45f2b;
        }
        .pair-group.highlight {
            animation: bouncePair 0.5s;
        }
        @keyframes bouncePair {
            50% { transform: scale(1.1); background: #fff2b5; }
        }
        #teachParityBtn {
            background: #ff6fab;
            box-shadow: 0 6px 0 #d94a8e;
        }
        .flash {
            animation: blinkBg 0.4s 2;
        }
        @keyframes blinkBg {
            50% { background: #ffea9e; box-shadow: 0 0 15px gold; }
        }
        .star-burst {
            animation: burst 0.5s;
        }
        @keyframes burst {
            100% { transform: scale(1.2); opacity: 0; }
        }

        .explain-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
        }
        .explain-modal.show {
            opacity: 1; visibility: visible;
        }
        .explain-content {
            background: #fffef0;
            max-width: 500px;
            width: 90%;
            border-radius: 60px;
            padding: 25px;
            text-align: center;
            border: 4px solid #ffd966;
        }
        .close-explain {
            background: #ffb347;
            border: none;
            font-size: 1.3rem;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mainMenu" class="main-menu">
        <h1>🐼 宝宝数学乐园 🎈</h1>
        <div class="menu-buttons">
            <button class="menu-btn" data-module="number"><span>🔢</span> 认识数字与数量</button>
            <button class="menu-btn" data-module="match"><span>🎈</span> 数量配对游戏</button>
            <button class="menu-btn" data-module="math"><span>🧸</span> 加减法小英雄</button>
            <button class="menu-btn" data-module="parity"><span>🌈</span> 奇偶数小侦探</button>
        </div>
        <div class="feedback">🎵 点一点，学数学，还有亲切的老师声音陪伴你！</div>
    </div>

    <div id="moduleNumber" class="module-container" style="display:none;">
        <div class="module-header">
            <button class="back-home-btn">🏠 返回</button>
            <div class="module-title">🔢 认识数字 <button class="explain-btn" data-module="number">📖 讲解</button></div>
        </div>
        <div class="card-content">
            <div class="number-show">
                <div class="big-digit" id="currentNumber">1</div>
                <div class="quantity-icons" id="quantityIcons"></div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevNumBtn">◀</button>
                    <button class="nav-btn" id="nextNumBtn">▶</button>
                </div>
                <div class="feedback">👆 点一点小动物会说话</div>
            </div>
        </div>
    </div>

    <div id="moduleMatch" style="display:none;">
        <div class="module-header">
            <button class="back-home-btn">🏠 返回</button>
            <div class="module-title">🎈 数一数 <button class="explain-btn" data-module="match">📖 讲解</button></div>
        </div>
        <div class="card-content">
            <div class="game-area">
                <div class="object-group" id="matchObjects"></div>
                <div class="options" id="matchOptions"></div>
                <div class="feedback" id="matchFeedback">有几个小可爱？</div>
                <div class="score-area">🏆 得分: <span id="matchScore">0</span></div>
            </div>
        </div>
    </div>

    <div id="moduleMath" style="display:none;">
        <div class="module-header">
            <button class="back-home-btn">🏠 返回</button>
            <div class="module-title">🧸 加减法 <button class="explain-btn" data-module="math">📖 讲解</button></div>
        </div>
        <div class="card-content">
            <div class="game-area">
                <div id="mathQuestion">3 + 2 = ?</div>
                <div class="options" id="mathOptions"></div>
                <div class="feedback" id="mathFeedback">✨ 选一选，答对有星星</div>
                <div class="score-area">⭐ 正确: <span id="mathScore">0</span></div>
                <div class="math-animation-area">
                    <div class="animation-stage" id="animationStage">点击按钮看动画</div>
                    <button class="animate-btn" id="animateMathBtn">🎬 动画演示</button>
                </div>
            </div>
        </div>
    </div>

    <div id="moduleParity" style="display:none;">
        <div class="module-header">
            <button class="back-home-btn">🏠 返回</button>
            <div class="module-title">🌈 奇偶数 <button class="explain-btn" data-module="parity">📖 讲解</button></div>
        </div>
        <div class="card-content">
            <div class="game-area">
                <div id="parityQuestion">这里有几个小动物？</div>
                <div id="parityIcons" class="object-group"></div>
                <div class="parity-area">
                    <button class="parity-btn" data-type="odd">🟢 单数</button>
                    <button class="parity-btn" data-type="even">🔵 双数</button>
                </div>
                <div id="pairAnimation" class="pair-animation"></div>
                <div class="feedback" id="parityFeedback">数一数，单数还是双数？</div>
                <div class="score-area">🏅 连对: <span id="parityScore">0</span></div>
                <div style="display:flex;gap:15px;justify-content:center;margin-top:10px;">
                    <button class="animate-btn" id="newParityBtn">🎲 换一题</button>
                    <button class="animate-btn" id="teachParityBtn">🎬 教学动画</button>
                </div>
            </div>
        </div>
    </div>
</div>

<button class="sound-control" id="soundToggleBtn">🔊 开启亲切语音</button>

<div id="explainModal" class="explain-modal">
    <div class="explain-content">
        <h3 id="explainTitle">小课堂</h3>
        <p id="explainText">讲解内容</p>
        <button class="close-explain">知道了</button>
    </div>
</div>

<script>
// ==================== 语音核心（已100%修复）====================
let speechEnabled = false;
const synth = window.speechSynthesis;

function speakText(text) {
    if (!speechEnabled) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    u.pitch = 1.2;
    synth.speak(u);
}

document.getElementById('soundToggleBtn').onclick = function() {
    speechEnabled = true;
    this.innerHTML = "🔊 语音已开启";
    this.style.background = "#8bc34a";
    speakText("你好呀！我是你的数学老师，我们一起快乐学数学吧！");
    setTimeout(() => {
        this.style.background = "#ffb347";
        this.innerHTML = "🔊 开启亲切语音";
    }, 2000);
};

// ==================== 工具函数 ====================
function flashElement(el) {
    if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 400); }
}
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ==================== 模块切换 ====================
const mainMenu = document.getElementById('mainMenu');
const modules = {
    number: document.getElementById('moduleNumber'),
    match: document.getElementById('moduleMatch'),
    math: document.getElementById('moduleMath'),
    parity: document.getElementById('moduleParity')
};

function showModule(id) {
    mainMenu.style.display = 'none';
    Object.values(modules).forEach(m => m.style.display = 'none');
    modules[id].style.display = 'block';
    if (id === 'number') renderNumberAndQuantity();
    if (id === 'match') renderMatchGame();
    if (id === 'math') renderMathQuestion();
    if (id === 'parity') refreshParityQuestion();
}

document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.onclick = () => showModule(btn.dataset.module);
});
document.querySelectorAll('.back-home-btn').forEach(btn => {
    btn.onclick = () => {
        mainMenu.style.display = 'block';
        Object.values(modules).forEach(m => m.style.display = 'none');
    };
});

// ==================== 数字模块 ====================
let currentNum = 1;
const numberIcons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐸'];
function renderNumberAndQuantity() {
    const n = currentNum;
    document.getElementById('currentNumber').innerText = n;
    const box = document.getElementById('quantityIcons');
    box.innerHTML = '';
    const icon = numberIcons[(n-1)%10];
    for(let i=0; i<n; i++) {
        const s = document.createElement('span');
        s.className = 'icon-item';
        s.textContent = icon;
        box.appendChild(s);
    }
}
document.getElementById('prevNumBtn').onclick = () => {
    if (currentNum>1) { currentNum--; renderNumberAndQuantity(); speakText(currentNum); }
};
document.getElementById('nextNumBtn').onclick = () => {
    if (currentNum<10) { currentNum++; renderNumberAndQuantity(); speakText(currentNum); }
};

// ==================== 配对模块 ====================
let matchScore = 0;
let currentMatchCount = 3;
const matchEmojis = ['🍎','🍌','🍒','🐥','🐣','⭐','🚗','🐟','🍪','🧸'];
function renderMatchGame() {
    const box = document.getElementById('matchObjects');
    box.innerHTML = '';
    const icon = matchEmojis[randomInt(0, matchEmojis.length-1)];
    for(let i=0; i<currentMatchCount; i++) {
        const s = document.createElement('span');
        s.className = 'object-emoji';
        s.textContent = icon;
        box.appendChild(s);
    }
    const opts = [currentMatchCount];
    while(opts.length<3) {
        const r = randomInt(1,10);
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(()=>Math.random()-0.5);
    const optBox = document.getElementById('matchOptions');
    optBox.innerHTML = '';
    opts.forEach(v => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = v;
        b.onclick = () => {
            if(v === currentMatchCount) {
                matchScore++;
                document.getElementById('matchScore').innerText = matchScore;
                speakText('真棒，答对了！');
                currentMatchCount = randomInt(1,10);
                renderMatchGame();
            } else {
                speakText('再数一数哦');
            }
        };
        optBox.appendChild(b);
    });
}

// ==================== 加减法模块 ====================
let mathScore = 0;
let currentMath = {a:3, b:2, op:'+', answer:5};
const animalIcons = ['🐼','🐧','🐨','🦊','🐸','🐻','🐱','🐶'];

function generateArithmetic() {
    const add = Math.random()<0.5;
    if(add) {
        const a = randomInt(0,8);
        const b = randomInt(0,9-a);
        return {a,b,op:'+', answer:a+b};
    } else {
        const a = randomInt(1,9);
        const b = randomInt(0,a);
        return {a,b,op:'-', answer:a-b};
    }
}

function renderMathQuestion() {
    currentMath = generateArithmetic();
    document.getElementById('mathQuestion').innerText = `${currentMath.a} ${currentMath.op} ${currentMath.b} = ?`;
    const opts = [currentMath.answer];
    while(opts.length<3) {
        const v = Math.max(0, Math.min(10, currentMath.answer + randomInt(-2,2)));
        if(!opts.includes(v)) opts.push(v);
    }
    opts.sort(()=>Math.random()-0.5);
    const box = document.getElementById('mathOptions');
    box.innerHTML = '';
    opts.forEach(v => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = v;
        b.onclick = () => {
            if(v == currentMath.answer) {
                mathScore++;
                document.getElementById('mathScore').innerText = mathScore;
                speakText('答对啦，真棒！');
                renderMathQuestion();
            } else speakText('再想想哦');
        };
        box.appendChild(b);
    });
}

document.getElementById('animateMathBtn').onclick = function() {
    const {a,b,op,answer} = currentMath;
    const stage = document.getElementById('animationStage');
    stage.innerHTML = '';
    const icon = animalIcons[randomInt(0,animalIcons.length-1)];
    
    for(let i=0; i<a; i++) {
        const s = document.createElement('span');
        s.className = 'anim-icon';
        s.textContent = icon;
        stage.appendChild(s);
    }
    
    const o = document.createElement('span');
    o.className = 'anim-operator';
    o.innerText = op;
    stage.appendChild(o);
    
    setTimeout(() => {
        if(op === '+') {
            for(let i=0; i<b; i++) {
                const s = document.createElement('span');
                s.className = 'anim-icon';
                s.textContent = icon;
                stage.appendChild(s);
            }
        } else {
            const all = stage.querySelectorAll('.anim-icon');
            for(let i=0; i<b; i++) {
                if(all[i]) all[i].className = 'anim-icon-removed';
            }
        }
        
        setTimeout(() => {
            const e = document.createElement('span');
            e.className = 'anim-operator';
            e.innerText = '=';
            stage.appendChild(e);
            
            for(let i=0; i<answer; i++) {
                const s = document.createElement('span');
                s.className = 'anim-icon';
                s.textContent = icon;
                stage.appendChild(s);
            }
            speakText(`${a}${op=='+'?'加':'减'}${b}等于${answer}`);
        }, 600);
    }, 500);
};

// ==================== 奇偶数模块 ====================
let parityScore = 0;
let currentParityCount = 5;
const parityEmojis = ['🐰','🐶','🐱','🐻','🐼','🦊','🐸','🐨'];

function refreshParityQuestion() {
    currentParityCount = randomInt(1,10);
    const box = document.getElementById('parityIcons');
    box.innerHTML = '';
    const icon = parityEmojis[randomInt(0, parityEmojis.length-1)];
    for(let i=0; i<currentParityCount; i++) {
        const s = document.createElement('span');
        s.className = 'object-emoji';
        s.textContent = icon;
        box.appendChild(s);
    }
    document.getElementById('parityQuestion').innerText = `这里有${currentParityCount}个小动物，单数还是双数？`;
    document.getElementById('pairAnimation').innerHTML = '';
}

function renderPairAnimation(count) {
    const box = document.getElementById('pairAnimation');
    box.innerHTML = '';
    const icon = parityEmojis[randomInt(0, parityEmojis.length-1)];
    const isOdd = count%2!==0;
    const pairs = Math.floor(count/2);
    
    for(let i=0; i<pairs; i++) {
        const g = document.createElement('div');
        g.className = 'pair-group highlight';
        const a = document.createElement('span'); a.textContent = icon;
        const b = document.createElement('span'); b.textContent = icon;
        const l = document.createElement('div');
        l.className = 'pair-label';
        l.innerText = '一对';
        g.appendChild(a); g.appendChild(b); g.appendChild(l);
        box.appendChild(g);
    }
    
    if(isOdd) {
        const g = document.createElement('div');
        g.className = 'pair-group highlight';
        const s = document.createElement('span');
        s.textContent = icon;
        const l = document.createElement('div');
        l.className = 'pair-label';
        l.innerText = '落单';
        g.appendChild(s); g.appendChild(l);
        box.appendChild(g);
        speakText('有落单的，是单数！');
    } else {
        speakText('都有好朋友，是双数！');
    }
}

document.querySelectorAll('.parity-btn').forEach(btn => {
    btn.onclick = function() {
        const wantOdd = this.dataset.type === 'odd';
        const isOdd = currentParityCount%2!==0;
        if( (wantOdd && isOdd) || (!wantOdd && !isOdd) ) {
            parityScore++;
            document.getElementById('parityScore').innerText = parityScore;
            speakText('答对啦！');
            renderPairAnimation(currentParityCount);
            setTimeout(refreshParityQuestion, 2500);
        } else {
            speakText('再想想哦');
        }
    };
});

document.getElementById('newParityBtn').onclick = refreshParityQuestion;
document.getElementById('teachParityBtn').onclick = function() {
    speakText('两个两个找朋友，都找到是双数，有落单是单数！');
    renderPairAnimation(currentParityCount);
};
